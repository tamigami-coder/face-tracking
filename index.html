<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOST BOX — 謎の木箱</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe FaceMesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
    <!-- ローディング画面 -->
    <div id="loading-screen" class="overlay">
        <div class="content">
            <h1 class="glitch" data-text="THE LOST BOX">THE LOST BOX</h1>
            <p id="loading-text">古びた木箱を発見した...</p>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
    </div>

    <!-- タイトル/モード選択画面 -->
    <div id="title-screen" class="overlay hidden">
        <div class="content">
            <h1 class="title">THE LOST BOX</h1>
            <p class="subtitle">古い屋根裏部屋で見つけた謎の木箱。<br>隠された4桁のコードを探し出せ。</p>
            <div class="mode-selection">
                <button id="btn-camera" class="premium-btn">🎥 カメラで遊ぶ</button>
                <button id="btn-mouse" class="premium-btn">🖱️ マウスで遊ぶ</button>
            </div>
            <p class="disclaimer">※カメラ使用時は顔の動きで操作します。HTTPS環境が必要です。</p>
        </div>
    </div>

    <!-- メインゲーム画面 -->
    <main id="game-container">
        <button id="reset-pos-btn" class="hidden" title="顔の基準位置をリセット">🔄 リセット</button>
        <div id="canvas-wrapper"></div>
        
        <!-- 操作ガイド -->
        <div id="guide-overlay" class="fade-out">
            <p id="guide-message">顔を左右に動かして箱を調べよう</p>
        </div>

        <!-- 南京錠UI -->
        <div id="padlock-ui">
            <div class="dial-container">
                <div class="dial" data-index="0">
                    <button class="dial-up">▲</button>
                    <span class="dial-value">0</span>
                    <button class="dial-down">▼</button>
                </div>
                <div class="dial" data-index="1">
                    <button class="dial-up">▲</button>
                    <span class="dial-value">0</span>
                    <button class="dial-down">▼</button>
                </div>
                <div class="dial" data-index="2">
                    <button class="dial-up">▲</button>
                    <span class="dial-value">0</span>
                    <button class="dial-down">▼</button>
                </div>
                <div class="dial" data-index="3">
                    <button class="dial-up">▲</button>
                    <span class="dial-value">0</span>
                    <button class="dial-down">▼</button>
                </div>
            </div>
        </div>

        <!-- ヒントボタン -->
        <button id="hint-btn">？</button>
        <div id="hint-display" class="hidden">
            <p id="hint-text"></p>
        </div>
    </main>

    <!-- クリア演出画面 -->
    <div id="clear-screen" class="overlay hidden">
        <div class="content">
            <h2 class="clear-title">LOCK UNLOCKED</h2>
            <p class="clear-msg">謎は解かれた。箱の中身は…<br>あなたの想像に委ねよう。</p>
            <button id="btn-restart" class="premium-btn">もう一度遊ぶ</button>
        </div>
    </div>

    <!-- カメラプレビュー（非表示、FaceMesh用） -->
    <video id="input-video" style="display:none;"></video>

    <!-- スクリプトの読み込み（ローカル実行対応のためモジュールを個別に読み込む） -->
    <script src="modules/textures.js"></script>
    <script src="modules/scene.js"></script>
    <script src="modules/faceTracker.js"></script>
    <script src="modules/mouseTracker.js"></script>
    <script src="modules/puzzleLogic.js"></script>
    <script src="modules/ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
