<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE LOST BOX — 謎の木箱</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- MediaPipe FaceMesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
    <!-- ローディング画面 -->
    <div id="loading-screen" class="overlay">
        <div class="content">
            <h1 class="glitch" data-text="THE LOST BOX">THE LOST BOX</h1>
            <p id="loading-text">古びた木箱を発見した...</p>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
    </div>

    <!-- タイトル/モード選択画面 -->
    <div id="title-screen" class="overlay hidden">
        <div class="content">
            <h1 class="title">THE LOST BOX</h1>
            <p class="subtitle">古い屋根裏部屋で見つけた謎の木箱。<br>隠された4桁のコードを探し出せ。</p>
            <div class="mode-selection">
                <button id="btn-camera" class="premium-btn">🎥 カメラで遊ぶ</button>
                <button id="btn-mouse" class="premium-btn">🖱️ マウスで遊ぶ</button>
            </div>
            <p class="disclaimer">※カメラ使用時は顔の動きで操作します。HTTPS環境が必要です。</p>
        </div>
    </div>

    <!-- メインゲーム画面 -->
    <main id="game-container">
        <!-- v2 ヘッダー -->
        <header id="game-header" class="hidden">
            <div id="stage-info">
                <span class="stage-count">STAGE 1/2</span>
                <h2 id="stage-name">影を探せ</h2>
            </div>
            <div class="header-controls">
                <button id="reset-pos-btn" title="顔の基準位置をリセット">🔄 顔位置リセット</button>
            </div>
        </header>

        <div id="canvas-wrapper">
            <!-- Three.js Canvas will be injected here -->
            <canvas id="blacklight-canvas"></canvas>
        </div>
        
        <!-- 操作ガイド -->
        <div id="guide-overlay" class="fade-out">
            <p id="guide-message">顔を左右に動かして箱を調べよう</p>
        </div>

        <!-- v2 フッター・入力パネル -->
        <footer id="game-footer" class="hidden">
            <!-- ステージ2: 南京錠UI (既存の流用・拡張) -->
            <div id="panel-padlock" class="input-panel hidden">
                <div class="dial-container">
                    <div class="dial" data-index="0">
                        <button class="dial-up">▲</button>
                        <span class="dial-value">0</span>
                        <button class="dial-down">▼</button>
                    </div>
                    <div class="dial" data-index="1">
                        <button class="dial-up">▲</button>
                        <span class="dial-value">0</span>
                        <button class="dial-down">▼</button>
                    </div>
                    <div class="dial" data-index="2">
                        <button class="dial-up">▲</button>
                        <span class="dial-value">0</span>
                        <button class="dial-down">▼</button>
                    </div>
                    <div class="dial" data-index="3">
                        <button class="dial-up">▲</button>
                        <span class="dial-value">0</span>
                        <button class="dial-down">▼</button>
                    </div>
                    <button id="unlock-btn" class="submit-btn">決定</button>
                </div>
            </div>

            <!-- ステージ3: 記号選択パネル -->
            <div id="panel-symbols" class="input-panel hidden">
                <div class="symbol-input-area">
                    <div class="symbol-slots">
                        <div class="slot" data-index="0">?</div>
                        <div class="slot" data-index="1">?</div>
                        <div class="slot" data-index="2">?</div>
                        <div class="slot" data-index="3">?</div>
                    </div>
                    <div class="symbol-buttons">
                        <button class="sym-btn" data-sym="ᛏ">ᛏ</button>
                        <button class="sym-btn" data-sym="ᚱ">ᚱ</button>
                        <button class="sym-btn" data-sym="ᚠ">ᚠ</button>
                        <button class="sym-btn" data-sym="ᚾ">ᚾ</button>
                        <button id="symbol-submit" class="submit-btn">決定</button>
                    </div>
                </div>
            </div>
        </footer>

        <!-- ヒントボタン (右下に配置) -->
        <button id="hint-btn" title="ヒントを表示">💡</button>

        <!-- ヒント表示 -->
        <div id="hint-display" class="hidden">
            <p id="hint-text">ヒントを読み込み中...</p>
        </div>
    </main>

    <!-- 通知メッセージ -->
    <div id="notification-container"></div>

    <!-- クリア演出画面 -->
    <div id="clear-screen" class="overlay hidden">
        <div class="content">
            <h2 class="clear-title">LOCK UNLOCKED</h2>
            <p class="clear-msg">謎は解かれた。箱の中身は…<br>あなたの想像に委ねよう。</p>
            <button id="btn-restart" class="premium-btn">もう一度遊ぶ</button>
        </div>
    </div>

    <!-- カメラプレビュー（非表示、FaceMesh用） -->
    <video id="input-video" style="display:none;"></video>

    <!-- スクリプトの読み込み（ローカル実行対応のためモジュールを個別に読み込む） -->
    <script src="modules/stateManager.js"></script>
    <script src="modules/blacklight.js"></script>
    <script src="modules/reverseWorld.js"></script>
    <script src="modules/claudeApi.js"></script>
    <script src="modules/textures.js"></script>
    <script src="modules/scene.js"></script>
    <script src="modules/faceTracker.js"></script>
    <script src="modules/mouseTracker.js"></script>
    <script src="modules/puzzleLogic.js"></script>
    <script src="modules/ui.js"></script>
    <script src="main.js"></script>
</body>
</html>
